<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 740" font-family="'PingFang SC','Microsoft YaHei',-apple-system,Segoe UI,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="525" y="38" text-anchor="middle" font-size="25" font-weight="700" fill="#1a1a1a">RL 算法的两维坐标：宽度 × 深度</text>
  <text x="525" y="64" text-anchor="middle" font-size="13" fill="#777">Width × Depth ·参考 Sutton &amp; Barto 统一视角，去掉中间过渡区,改为横=宽 / 纵=深两条正交轴</text>

  <!-- quadrant background tints -->
  <rect x="170" y="100" width="355" height="260" fill="#e9f1fb"/>
  <rect x="525" y="100" width="355" height="260" fill="#f3eefb"/>
  <rect x="170" y="360" width="355" height="260" fill="#eaf6ee"/>
  <rect x="525" y="360" width="355" height="260" fill="#fcf0ec"/>

  <!-- grid border + dividers -->
  <rect x="170" y="100" width="710" height="520" fill="none" stroke="#b8b8b8" stroke-width="1.5"/>
  <line x1="525" y1="100" x2="525" y2="620" stroke="#b8b8b8" stroke-width="1.5"/>
  <line x1="170" y1="360" x2="880" y2="360" stroke="#b8b8b8" stroke-width="1.5"/>

  <!-- ===== vertical axis: DEPTH (top shallow -> bottom deep) ===== -->
  <line x1="118" y1="100" x2="118" y2="620" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="118" y="90" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="600">shallow 浅</text>
  <text x="118" y="638" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="600">deep 深</text>
  <text x="52" y="360" text-anchor="middle" font-size="17" fill="#c0392b" font-weight="700" transform="rotate(-90 52 360)">Depth 深度 · one-step → multi-step (bootstrapping)</text>

  <!-- ===== horizontal axis: WIDTH (left narrow -> right wide) ===== -->
  <line x1="170" y1="668" x2="880" y2="668" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="225" y="690" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="600">narrow 窄 (sample 采样一条)</text>
  <text x="800" y="690" text-anchor="middle" font-size="13" fill="#c0392b" font-weight="600">wide 宽 (full 遍历所有)</text>
  <text x="525" y="722" text-anchor="middle" font-size="17" fill="#c0392b" font-weight="700">Width 宽度 · sample → full backup</text>

  <!-- ================= TD (top-left: sample · one-step) ================= -->
  <text x="347" y="142" text-anchor="middle" font-size="22" font-weight="700" fill="#1f4e79">TD · 时序差分</text>
  <text x="347" y="163" text-anchor="middle" font-size="13" fill="#666">sample · one-step  (采样 · 一步自举)</text>
  <line x1="347" y1="185" x2="347" y2="231" stroke="#333" stroke-width="1.3"/>
  <circle cx="347" cy="185" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="347" cy="208" r="4" fill="#333"/>
  <circle cx="347" cy="231" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>

  <!-- ================= DP (top-right: full · one-step) ================= -->
  <text x="702" y="142" text-anchor="middle" font-size="22" font-weight="700" fill="#5b3a8e">DP · 动态规划</text>
  <text x="702" y="163" text-anchor="middle" font-size="13" fill="#666">full · one-step  (遍历 · 一步自举)</text>
  <g stroke="#333" stroke-width="1.3">
    <line x1="702" y1="183" x2="684" y2="203"/>
    <line x1="702" y1="183" x2="720" y2="203"/>
    <line x1="684" y1="203" x2="672" y2="227"/>
    <line x1="684" y1="203" x2="696" y2="227"/>
    <line x1="720" y1="203" x2="708" y2="227"/>
    <line x1="720" y1="203" x2="732" y2="227"/>
  </g>
  <circle cx="702" cy="183" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="684" cy="203" r="4" fill="#333"/>
  <circle cx="720" cy="203" r="4" fill="#333"/>
  <circle cx="672" cy="227" r="7" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="696" cy="227" r="7" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="708" cy="227" r="7" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="732" cy="227" r="7" fill="#fff" stroke="#333" stroke-width="1.5"/>

  <!-- ================= Monte Carlo (bottom-left: sample · deep) ================= -->
  <text x="347" y="398" text-anchor="middle" font-size="22" font-weight="700" fill="#2e7d4f">Monte Carlo · 蒙特卡洛</text>
  <text x="347" y="419" text-anchor="middle" font-size="13" fill="#666">sample · deep  (采样 · 走到终局)</text>
  <line x1="347" y1="442" x2="347" y2="588" stroke="#333" stroke-width="1.3"/>
  <circle cx="347" cy="442" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="347" cy="466" r="4" fill="#333"/>
  <circle cx="347" cy="490" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="347" cy="514" r="4" fill="#333"/>
  <circle cx="347" cy="538" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="347" cy="562" r="4" fill="#333"/>
  <rect x="340" y="581" width="14" height="14" fill="#999" stroke="#333" stroke-width="1.5"/>

  <!-- ================= Exhaustive Search (bottom-right: full · deep) ================= -->
  <text x="702" y="398" text-anchor="middle" font-size="22" font-weight="700" fill="#a8431f">Exhaustive Search · 穷举搜索</text>
  <text x="702" y="419" text-anchor="middle" font-size="13" fill="#666">full · deep  (遍历 · 走到终局)</text>
  <g stroke="#333" stroke-width="1.2">
    <line x1="702" y1="440" x2="684" y2="460"/>
    <line x1="702" y1="440" x2="720" y2="460"/>
    <line x1="684" y1="460" x2="672" y2="482"/>
    <line x1="684" y1="460" x2="696" y2="482"/>
    <line x1="720" y1="460" x2="708" y2="482"/>
    <line x1="720" y1="460" x2="732" y2="482"/>
    <line x1="672" y1="482" x2="672" y2="504"/>
    <line x1="696" y1="482" x2="696" y2="504"/>
    <line x1="708" y1="482" x2="708" y2="504"/>
    <line x1="732" y1="482" x2="732" y2="504"/>
    <line x1="672" y1="504" x2="672" y2="524"/>
    <line x1="696" y1="504" x2="696" y2="524"/>
    <line x1="708" y1="504" x2="708" y2="524"/>
    <line x1="732" y1="504" x2="732" y2="524"/>
  </g>
  <circle cx="702" cy="440" r="8" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="684" cy="460" r="4" fill="#333"/>
  <circle cx="720" cy="460" r="4" fill="#333"/>
  <circle cx="672" cy="482" r="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="696" cy="482" r="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="708" cy="482" r="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="732" cy="482" r="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <circle cx="672" cy="504" r="3.5" fill="#333"/>
  <circle cx="696" cy="504" r="3.5" fill="#333"/>
  <circle cx="708" cy="504" r="3.5" fill="#333"/>
  <circle cx="732" cy="504" r="3.5" fill="#333"/>
  <rect x="667" y="524" width="10" height="10" fill="#999" stroke="#333" stroke-width="1.3"/>
  <rect x="691" y="524" width="10" height="10" fill="#999" stroke="#333" stroke-width="1.3"/>
  <rect x="703" y="524" width="10" height="10" fill="#999" stroke="#333" stroke-width="1.3"/>
  <rect x="727" y="524" width="10" height="10" fill="#999" stroke="#333" stroke-width="1.3"/>
</svg>
